 # === 凄ノ皇（凄ノ皇）正式名称への更新 ===
 tsf_susanoo_concept: "凄ノ皇 開発計画"
 tsf_susanoo_concept_desc: "戦略航空機動要塞「凄ノ皇（凄ノ皇）」の基礎研究。超大型・重武装の対BETA決戦兵器の概念を確立する。"
 tsf_susanoo_2: "凄ノ皇・弐型 (XG-70b)"
 tsf_susanoo_2_desc: "戦略航空機動要塞 凄ノ皇・弐型。Moorcock-Lechte エンジン搭載、荷電粒子砲装備。00 Unit によって運用される試作機。"
 tsf_susanoo_3: "凄ノ皇・参型 (XG-70c)"
 tsf_susanoo_3_desc: "戦略航空機動要塞 凄ノ皇・参型。各種性能を底上げした改良型。"
 tsf_susanoo_4: "凄ノ皇・四型 (XG-70d)"
 tsf_susanoo_4_desc: "戦略航空機動要塞 凄ノ皇・四型。最終発展型、全長180m、人類兵器の頂点。"
 xg_equipment: "戦略航空機動要塞 凄ノ皇"
 xg_equipment_desc: "対BETA決戦兵器。単機で一個師団に匹敵する戦闘力を持つ超大型機動要塞。Moorcock-Lechte エンジン駆動。"
 xg_equipment_0: "凄ノ皇・弐型"
 xg_equipment_0_desc: "XG-70b。Mk. II。第二試作機、荷電粒子砲装備。"
 xg_equipment_1: "凄ノ皇・参型"
 xg_equipment_1_desc: "XG-70c。Mk. III。改良型。"
 xg_equipment_2: "凄ノ皇・四型"
 xg_equipment_2_desc: "XG-70d。Mk. IV。最終発展型、180m級、人類最終兵器。"
 MVLV_xg_battalion: "凄ノ皇大隊"
 MVLV_xg_battalion_desc: "1個大隊につき1機の凄ノ皇を運用する超大型部隊。"
 group_xg_title: "戦略航空機動要塞"