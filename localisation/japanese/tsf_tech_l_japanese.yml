l_japanese:
 tsf_folder: "戦術機"
 tsf_folder_tab: "戦術機"
 tsf_tech: "戦術機技術"

 # === 基幹テク ===
 tsf_basic_framework: "戦術機開発計画"
 tsf_basic_framework_desc: "戦術機の基本概念と基幹技術を確立する。基本装備モジュール（装甲・OS・エンジン・頭部・突撃砲）および戦術機大隊・支援機大隊の編成が可能になる。"

 # === 第1世代基幹機 ===
 tsf_1_light_framework: "第1世代軽量戦術機"
 tsf_1_light_framework_desc: "第1世代軽量型戦術機（F-5 フリーダムファイター戦術機相当）を実用化する。機動性を重視した汎用戦闘機。"
 tsf_1_light_mod_framework: "第1世代軽量戦術機 改良型"
 tsf_1_light_mod_framework_desc: "第1世代軽量機の改良型。スロット拡張で装備の自由度が向上、性能を底上げした派生型。"
 tsf_1_heavy_framework: "第1世代重装戦術機"
 tsf_1_heavy_framework_desc: "第1世代重装型戦術機（F-4 ファントム戦術機相当）を実用化する。装甲と火力を重視した突破型。"
 tsf_F-4JK: "F-4JK改 瑞鶴"
 tsf_F-4JK_desc: "日本独自に F-4 を改修した重装戦術機。山岳兵への対応能力を持つ。"

 # === 第2世代基幹機 ===
 tsf_2_light_framework: "第2世代軽量戦術機"
 tsf_2_light_framework_desc: "第2世代軽量型戦術機（F-16/MiG-29 相当）を実用化する。生産性と汎用性を両立した量産機。"
 tsf_2_heavy_framework: "第2世代重装戦術機"
 tsf_2_heavy_framework_desc: "第2世代重装型戦術機（F-15/Su-27 相当）を実用化する。長期拡張性と機体剛性に優れる。"
 tsf_2_maneuver_framework: "第2世代高機動戦術機"
 tsf_2_maneuver_framework_desc: "第2世代高機動型戦術機（94式 不知火/Su-37 相当）を実用化する。近接格闘性能と機動性に特化。"

 # === 第3世代基幹機 ===
 tsf_3_light_framework: "第3世代軽量戦術機"
 tsf_3_light_framework_desc: "第3世代軽量型戦術機（F-35 相当）を実用化する。ステルス性と汎用性を高水準で両立。"
 tsf_3_heavy_framework: "第3世代重装戦術機"
 tsf_3_heavy_framework_desc: "第3世代重装型戦術機（10式 極光相当）を実用化する。最高峰の装甲と火力を持つ最強の突破型。"
 tsf_3_maneuver_framework: "第3世代高機動戦術機"
 tsf_3_maneuver_framework_desc: "第3世代高機動型戦術機（F-22 ラプター相当）を実用化する。ステルス性と高機動性を併せ持つ最強の格闘戦機。"

 # === 第4世代基幹機 ===
 tsf_4_framework: "第4世代統合戦術機"
 tsf_4_framework_desc: "第4世代統合型戦術機（XF-2000 相当）を実用化する。全領域対応の最終世代戦術機。"

 # === エンジン系 ===
 tsf_engine_1: "第1世代エンジン"
 tsf_engine_1_desc: "戦術機用ジェットエンジン第1世代。基本推力に加え、追加スラスター・背面スラスターが利用可能になる。"
 tsf_engine_2: "第2世代エンジン"
 tsf_engine_2_desc: "戦術機用ジェットエンジン第2世代。推力と燃費が向上。"
 tsf_engine_3: "第3世代エンジン"
 tsf_engine_3_desc: "戦術機用ジェットエンジン第3世代。最高推力と低燃費を実現。"
 tsf_engine_4: "第4世代エンジン"
 tsf_engine_4_desc: "戦術機用最先端エンジン。プラズマ駆動推進系。"
 tsf_engine_maneuver_1: "第1世代高機動エンジン"
 tsf_engine_maneuver_1_desc: "格闘戦特化型エンジン第1世代。瞬発機動性に優れる。"
 tsf_engine_maneuver_2: "第2世代高機動エンジン"
 tsf_engine_maneuver_2_desc: "格闘戦特化型エンジン第2世代。高機動戦闘の主推進系。"
 tsf_engine_maneuver_3: "第3世代高機動エンジン"
 tsf_engine_maneuver_3_desc: "格闘戦特化型エンジン第3世代。最高峰の機動性能。"
 tsf_engine_cruise_1: "第1世代巡航エンジン"
 tsf_engine_cruise_1_desc: "長距離航続用エンジン第1世代。低燃費で広域展開可能。"
 tsf_engine_cruise_2: "第2世代巡航エンジン"
 tsf_engine_cruise_2_desc: "長距離航続用エンジン第2世代。"
 tsf_engine_cruise_3: "第3世代巡航エンジン"
 tsf_engine_cruise_3_desc: "長距離航続用エンジン第3世代。"

