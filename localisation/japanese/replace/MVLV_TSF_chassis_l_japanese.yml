 MVLV_TSF_chassis_0: "NCAF-X"
 MVLV_TSF_chassis_0_desc: "月面戦争で運用された大型の船外活動ユニット(MMU)を基にした地球での活動が可能な新概念兵器の開発計画であるNCAF-X計画によって生み出されたもの、あるいはそれに類する戦術機の自国生産能力を実証するためのプラットフォーム。戦術機として最低限の能力を備えているが、実際にBETAとの戦闘で投入することはほとんど不可能と言っても良い。実験的な存在であり、実戦に投入されるようなものとしては第一世代戦術機の完成を待つ必要がある。"
 MVLV_TSF_chassis_1_light: "第一世代軽戦術機"
 MVLV_TSF_chassis_1_light_desc: "分類における第一世代軽戦術機は、米国ノースロック社によって開発されたF-5フリーダムファイターと、それに類する諸派生型を指す。高い生産性を持つ戦術機として設計されたこのフレームと諸派生型は、BETA大戦初期における人類の戦術機配備に関して大きな貢献を果たした。特に欧州戦線ではその軽快さが高く評価され現地改修による長期的な運用が行われ、このフレーム系統は多くの低コスト戦術機を実現している。"
 MVLV_TSF_chassis_1_light_mod: "第一世代改良型軽戦術機"
 MVLV_TSF_chassis_1_light_mod_desc: "主に欧州連合で多用された第一世代軽戦術機の拡張改良型。"
 MVLV_TSF_chassis_1_heavy: "第一世代重戦術機"
 MVLV_TSF_chassis_1_heavy_desc: "分類における第一世代重戦術機は、米国陸・海・空・宇宙軍の共同によって開発された人類初の戦術機であるF-4と、それに類する諸派生型を指す。人類初の戦術機として開発されたF-4のフレームおよび機体構造は、その未成熟さをあらかじめ見越して設計されているために拡張・改修が容易となるようなデザインとなっている。アフリカでの派生型の運用や日本における運用実績が示すように、このフレーム系統は旧世代型でありながらも高い拡張性と低めのコストを実現している。"
 MVLV_TSF_chassis_2_light: "第二世代軽戦術機"
 MVLV_TSF_chassis_2_light_desc: "分類における第二世代軽戦術機は、第一世代戦術機における課題であった機動性を改善することを念頭に置いた第二世代機のうち、特にF-5とその派生型の後継機や、生産性に重きを置いたものを指す。F-15やF-14のような戦術機において指摘された量産性の低さを補うことを期待して設計されたF-16やMiG-29といった前線国家におけるベストセラー機体を筆頭に、軽量で優秀な機体設計の基となったこのフレーム系統はコストパフォーマンスで優れている。"
 MVLV_TSF_chassis_2_heavy: "第二世代重戦術機"
 MVLV_TSF_chassis_2_heavy_desc: "分類における第二世代重戦術機は、第一世代機における課題であった機動性を改善することを念頭に置いた第二世代機のうち、特にF-4とその派生型の後継機や、機体性能の向上・ペイロード拡大に重きを置いたものを指す。F-16やMiG-29のような小型軽量の戦術機では将来的な性能向上に限度があるが、F-4に続く後継機として設計されたF-15やその改修型として準第三世代相当へ強化されたF-15ACTVの存在のように、このフレーム系統は長期的な拡張性や機体全体の剛性といった面で優れている。"
 MVLV_TSF_chassis_2_maneuver: "第二世代高機動戦術機"
 MVLV_TSF_chassis_2_maneuver_desc: "分類における第二世代高機動戦術機は、第二世代機開発の中でも後期に設計・製造された、特に格闘戦性能へ重きを置いた、従来の米国製戦術機系統とは離れている日本の94式やソ連のSu-37に代表される諸戦術機を指す。拡張性を犠牲にしてでも設計されたこれら高機動戦術機は、密集格闘戦や近接格闘を想定して様々な改修と基礎性能向上が組み込まれ、一部は第三世代機と遜色ないほどに強化されている。このフレーム系統では機動性の他に大型種に対する突出した対処能力を誇る。"
 MVLV_TSF_chassis_3_light: "第三世代軽戦術機"
 MVLV_TSF_chassis_3_light_desc: "分類における第三世代軽戦術機は、第二世代での低コスト・軽量という特徴を継承してさらなる性能向上を目指した諸戦術機を指す。米国でのF-35開発やソ連でのMiG-35開発に代表されるように、高い基本スペックと複数任務対応力を成立させながらもコストダウンが図られている。拡張性の面での成長はさほど見られないが、それでもこのフレーム系統は十分なコストパフォーマンスを基に新時代戦術機としての高い性能を有している。"
 MVLV_TSF_chassis_3_heavy: "第三世代重戦術機"
 MVLV_TSF_chassis_3_heavy_desc: "分類における第三世代重戦術機は、第二世代での高い拡張性・高い耐久性という特徴を継承しつつさらなる性能向上を目指した諸戦術機を指す。米国でのATSF計画に伴って設計されたF-22を筆頭として、前世代型よりも高い性能を実現するためのさらなるパーツ追加を可能とするべく拡張性はさらに高められている。基礎スペックの強化自体はコストに対してさほど目立つものではないが、このフレーム系統は高性能化へと突き進む新時代戦術機の需要に応えることができる。"
 MVLV_TSF_chassis_3_maneuver: "第三世代高機動戦術機"
 MVLV_TSF_chassis_3_maneuver_desc: "分類における第三世代高機動戦術機は、第三世代機のうちでも特に近接格闘性能に振り切った諸戦術機を指す。第三世代機としてのスタンダードが確立される直前に設計・製造されたものに多く見られる高性能を追求した系譜を踏襲して、カーボンブレードを機体の細部に取り込んだ設計のSu-47に代表されるような高機動性・対大型種殲滅能力の強化が特徴。このフレーム系統は前世代機からさらに高められた機動性と大型種への対処能力を誇る。"
 MVLV_TSF_chassis_4: "第四世代戦術機"
 MVLV_TSF_chassis_4_desc: "第四世代戦術機は作戦行動領域を1G～0G環境にまで拡大され、専用開発の長刀や突撃砲も用意されているほか、0G空間での活動では携行化された荷電粒子砲を搭載した追加ブースターユニットを装着する。これまでの戦術機における基本を根底から塗り替える新時代の戦術機として相応しい性能を持つ。"
 
