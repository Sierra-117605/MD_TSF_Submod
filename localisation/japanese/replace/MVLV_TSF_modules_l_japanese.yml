l_japanese:
 EQ_MOD_SLOT_MVLV_TSF_armor_slot_TITLE: "装甲"
 EQ_MOD_SLOT_MVLV_TSF_armor_slot_TITLE_desc: "装甲スロットの説明"
 EQ_MOD_CAT_MVLV_TSF_armor_type_TITLE: "装甲"
 EQ_MOD_CAT_MVLV_TSF_armor_type_TITLE_desc: "装甲タイプの説明"
 MVLV_TSF_armor_composite: "スターライト樹脂複合装甲(強化型)"
 MVLV_TSF_armor_composite_desc: "対光線塗膜や複数素材を用いて構成される複合装甲。コストは増加するが、機動性をそのままに高い生存性を提供する。"
 MVLV_TSF_no_armor: "装甲非装着(軽量化)"
 MVLV_TSF_no_armor_desc: "装甲を装備しない。露出したフレームは耐久性低下や深刻な生存性低下を招くが、装甲のコストは無視できるようになる。"
 MVLV_TSF_armor_heavy: "スターライト樹脂複合装甲(重装型)"
 MVLV_TSF_armor_heavy_desc: "機体全体の剛性および装甲を強化する。信頼性の低下は免れないが、一度や二度の攻撃で撃破されることを回避できる。"
 MVLV_TSF_armor_light: "スターライト樹脂複合装甲(軽量型)"
 MVLV_TSF_armor_light_desc: "装甲を減じ、機動性を向上させる。事故の原因にもなり大型種相手にも撃破されやすくなるが、コストも低減できる。"
 MVLV_TSF_armor_nomal: "スターライト樹脂複合装甲(標準)"
 MVLV_TSF_armor_nomal_desc: "オーソドックスな装甲。戦術機として活動するために必要十分な防護や機動性を提供する。"
 
 EQ_MOD_SLOT_MVLV_TSF_OS_slot_TITLE: "オペレーションシステム"
 EQ_MOD_SLOT_MVLV_TSF_OS_slot_TITLE_desc: "オペレーションシステムスロットの説明"
 EQ_MOD_CAT_MVLV_TSF_OS_normal_type_TITLE: "通常OS"
 EQ_MOD_CAT_MVLV_TSF_OS_normal_type_TITLE_desc: "通常OSタイプの説明"
 MVLV_TSF_basic_OS: "第1世代戦術機OS"
 MVLV_TSF_basic_OS_desc: "初期型OSは月面戦争で運用されたハーディマンに搭載されるOSに極めて近いもので、初歩的な三次元機動と各種兵装の運用が可能。"
 MVLV_TSF_OS_1_normal: "第1世代汎用OS"
 MVLV_TSF_OS_1_normal_desc: "幅広い範囲で汎用的に運用できる基本的なOS。全ての交戦距離に対応しているが、器用貧乏とも言える。"
 MVLV_TSF_OS_2_normal: "第2世代汎用OS"
 MVLV_TSF_OS_2_normal_desc: "改良された汎用OS。各種センサーとの統合やプロセッサの性能向上により生存性および作戦能力を高めている。"
 MVLV_TSF_OS_3_normal: "第3世代汎用OS"
 MVLV_TSF_OS_3_normal_desc: "さらなる発展を遂げた汎用OS。より改善されたアルゴリズムやセンサー、プロセッサによって状況認識力を向上させている。"
 MVLV_TSF_OS_4_normal: "第3.5世代汎用OS"
 MVLV_TSF_OS_4_normal_desc: "XM3以上の性能を持つ汎用OS。もはや人類はかつての天才を凌駕した。"
 MVLV_TSF_OS_XM3: "XM3 戦術機OS"
 MVLV_TSF_OS_XM3_desc: "XM3はオルタネイティブ4技術の一部を利用したもので、処理性能の向上に姿勢制御入力に対する柔軟性を組み合わせたことで運動性を大きく向上させている。"

 EQ_MOD_CAT_MVLV_TSF_OS_close_type_TITLE: "近接OS"
 EQ_MOD_CAT_MVLV_TSF_OS_close_type_TITLE_desc: "近接OSタイプの説明"
 MVLV_TSF_OS_1_close: "近接戦闘特化OS Mark I"
 MVLV_TSF_OS_1_close_desc: "近接特化OSはその名の通り処理システムを近距離での機動および攻撃に特化させたもので、大型種の対処で機動性による攪乱といった選択肢を与える。"
 MVLV_TSF_OS_2_close: "近接戦闘特化OS Mark II"
 MVLV_TSF_OS_2_close_desc: "改良された近接特化OS。接近する敵に対する状況認識インターフェースの導入などにより、近接戦闘での生存性を高め、さらに攻撃性を高めている。"
 MVLV_TSF_OS_3_close: "近接戦闘特化OS Mark III"
 MVLV_TSF_OS_3_close_desc: "さらなる発展を遂げた近接特化OS。長刀の運動エネルギー最大化といった自動化機能が部分的に導入され、攻撃力にさらなる磨きがかかっている。"
 MVLV_TSF_OS_XM3_close: "XM3 近接戦闘OS"
 MVLV_TSF_OS_XM3_close_desc: "近接特化型のXM3。操縦者の行動特性を集積して組み込むことで各操縦者に最適化されたXM3のシステム設計は、近接特化OSと良い相性を発揮する。"

 EQ_MOD_CAT_MVLV_TSF_OS_support_type_TITLE: "支援OS"
 EQ_MOD_CAT_MVLV_TSF_OS_support_type_TITLE_desc: "支援OSタイプの説明"
 MVLV_TSF_OS_1_support: "支援戦闘特化OS Mark I"
 MVLV_TSF_OS_1_support_desc: "支援特化OSは中遠距離における支援突撃砲の運用といった部分へ特化させることに注目したOSで、処理システムを火器管制へ集中させている。"
 MVLV_TSF_OS_2_support: "支援戦闘特化OS Mark II"
 MVLV_TSF_OS_2_support_desc: "改良された支援特化OS。目標の未来位置計算や脆弱部位の表示、照準安定装置などを導入したことで大型種への有効性を大きく向上させた。"
 MVLV_TSF_OS_3_support: "支援戦闘特化OS Mark III"
 MVLV_TSF_OS_3_support_desc: "さらなる発展を遂げた支援特化OS。センサー類との連携により追跡中捜索や同時多目標追跡システムによる攻撃効率最大化が図られている。"
 MVLV_TSF_OS_XM3_support: "XM3 支援戦闘OS"
 MVLV_TSF_OS_XM3_support_desc: "支援特化型のXM3。操縦者の認知特性を集積データから目標選択アルゴリズムに組み込むことで、各操縦者に特化した攻撃補助システムとなっている。"

 EQ_MOD_SLOT_MVLV_TSF_engine_slot_TITLE: "推進システム"
 EQ_MOD_SLOT_MVLV_TSF_engine_slot_TITLE_desc: "推進システムスロットの説明"
 EQ_MOD_CAT_MVLV_TSF_engine_normal_type_TITLE: "汎用推進システム"
 EQ_MOD_CAT_MVLV_TSF_engine_normal_type_TITLE_desc: "汎用推進システムタイプの説明"
 MVLV_TSF_no_engine: "跳躍ユニット非装着(構造のみ)"
 MVLV_TSF_no_engine_desc: "推進システムを装備しない。機動性は大きく低下し、組織的な行動も困難となる。"
 MVLV_TSF_basic_engine: "FE79-FHI-17A 跳躍ユニット"
 MVLV_TSF_basic_engine_desc: "初歩的な推進システム。戦術機向けに最適化されたものではない。"
 MVLV_TSF_engine_1: "FE100-PW-100 跳躍ユニット"
 MVLV_TSF_engine_1_desc: "基本的な推進システム。推進剤による動力系統の独立といった戦術機のスタンダードに準じている。"
 MVLV_TSF_engine_2: "FE100-PW-200 跳躍ユニット"
 MVLV_TSF_engine_2_desc: "改良された推進システム。推力向上だけでなく操作性も改善する種々雑多な改良が施されている。"
 MVLV_TSF_engine_3: "FE119-PW-100 跳躍ユニット"
 MVLV_TSF_engine_3_desc: "さらに発展した推進システム。スラスタ全体の性能向上および各種推進システムの最適化が行われている。"
 MVLV_TSF_engine_4: "FE135-PW-600 跳躍ユニット"
 MVLV_TSF_engine_4_desc: "宇宙空間での運動さえも可能となった推進システム。その極めて高い出力は他の推進システムを置き去りにする。"
 
 EQ_MOD_CAT_MVLV_TSF_engine_maneuver_type_TITLE: "高機動推進システム"
 EQ_MOD_CAT_MVLV_TSF_engine_maneuver_type_TITLE_desc: "高機動推進システムタイプの説明"
 MVLV_TSF_engine_maneuver_1: "FE108-FHI-220 高機動跳躍ユニット"
 MVLV_TSF_engine_maneuver_1_desc: "瞬発力・加速力重視の推進システム。近接戦闘での高速機動や早急な展開が可能となるが、燃費は犠牲になる。"
 MVLV_TSF_engine_maneuver_2: "FE108-FHI-223 高機動跳躍ユニット"
 MVLV_TSF_engine_maneuver_2_desc: "改良された高機動推進システム。推力偏向技術の応用やスラスタ自体の可動部拡張によってさらなる運動性を突き詰めている。"
 MVLV_TSF_engine_maneuver_3: "FE108-FHI-227 高機動跳躍ユニット"
 MVLV_TSF_engine_maneuver_3_desc: "さらに発展した高機動推進システム。爆発的な推力によって速度ベクトルの急変化を可能とする。"
 
 EQ_MOD_CAT_MVLV_TSF_engine_cruise_type_TITLE: "巡航推進システム"
 EQ_MOD_CAT_MVLV_TSF_engine_cruise_type_TITLE_desc: "巡航推進システムタイプの説明"
 MVLV_TSF_engine_cruise_1: "FE100-PW-100 巡航仕様"
 MVLV_TSF_engine_cruise_1_desc: "燃費・生産性重視の推進システム。足回りでの不利を抱えることにはなるが、高い生産性と燃費を持つ。"
 MVLV_TSF_engine_cruise_2: "FE100-PW-220 巡航仕様"
 MVLV_TSF_engine_cruise_2_desc: "改良された巡航推進システム。長距離航行時の性能だけでなく近接戦闘時の機動性もある程度確保している。"
 MVLV_TSF_engine_cruise_3: "FE119-PW-100 巡航仕様"
 MVLV_TSF_engine_cruise_3_desc: "さらに発展した巡航推進システム。光線級に対処することができるほどの機動性を獲得している。"
 
 EQ_MOD_SLOT_MVLV_TSF_headUnit_slot_TITLE: "頭部ユニット"
 EQ_MOD_SLOT_MVLV_TSF_headUnit_slot_TITLE_desc: "頭部ユニットスロットの説明"
 EQ_MOD_CAT_MVLV_TSF_headUnit_nomal_type_TITLE: "基本頭部ユニット"
 EQ_MOD_CAT_MVLV_TSF_headUnit_nomal_type_TITLE_desc: "基本頭部ユニットタイプの説明"
 MVLV_TSF_basic_head: "第1世代汎用頭部ユニット"
 MVLV_TSF_basic_head_desc: "極めて初期の頭部ユニット。最低限のセンサーと視界を提供する。"
 MVLV_TSF_head_normal_1: "汎用頭部ユニット(初期型)"
 MVLV_TSF_head_normal_1_desc: "基本的な頭部ユニット。人間と同等の視野角を提供し、環境センサーを搭載している。"
 MVLV_TSF_head_normal_2: "汎用頭部ユニット(改良型)"
 MVLV_TSF_head_normal_2_desc: "改良された頭部ユニット。光学ズームシステムを搭載したことで遠距離の目標を観測できる。"
 MVLV_TSF_head_normal_3: "汎用頭部ユニット(発展型)"
 MVLV_TSF_head_normal_3_desc: "さらに発展した頭部ユニット。サーマルサイトといった赤外線センサーの導入により効率的な目標の発見が可能。"
 
 EQ_MOD_CAT_MVLV_TSF_headUnit_heavy_type_TITLE: "装甲頭部ユニット"
 EQ_MOD_CAT_MVLV_TSF_headUnit_heavy_type_TITLE_desc: "装甲頭部ユニットタイプの説明"
 MVLV_TSF_head_heavy_1: "重装甲頭部ユニット(初期型)"
 MVLV_TSF_head_heavy_1_desc: "状況認識能力を犠牲に装甲を強化している頭部ユニット。BETAの攻撃からの生存性を高めることができるが、視野角といった要素は犠牲になる。"
 MVLV_TSF_head_heavy_2: "重装甲頭部ユニット(改良型)"
 MVLV_TSF_head_heavy_2_desc: "改良された装甲頭部ユニット。基本的な頭部ユニットに準じた性能を獲得し、視察能力も改善されている。"
 MVLV_TSF_head_heavy_3: "重装甲頭部ユニット(発展型)"
 MVLV_TSF_head_heavy_3_desc: "さらに発展した装甲頭部ユニット。光学ズームや環境センサーの運用が可能となり、状況認識能力がさらに改善されている。"
 
 EQ_MOD_CAT_MVLV_TSF_headUnit_aerial_type_TITLE: "空力頭部ユニット"
 EQ_MOD_CAT_MVLV_TSF_headUnit_aerial_type_TITLE_desc: "空力頭部ユニットタイプの説明"
 MVLV_TSF_head_aerial_1: "空力洗練頭部ユニット(初期型)"
 MVLV_TSF_head_aerial_1_desc: "装甲を犠牲に空力特性を追求した頭部ユニット。センサー類および視野角に大きな強みを持つが、生存性といった要素は犠牲になる。"
 MVLV_TSF_head_aerial_2: "空力洗練頭部ユニット(改良型)"
 MVLV_TSF_head_aerial_2_desc: "改良された空力頭部ユニット。環境センサー類との統合やシステムとの連接最適化によって状況認識能力を高めている。"
 MVLV_TSF_head_aerial_3: "空力洗練頭部ユニット(発展型)"
 MVLV_TSF_head_aerial_3_desc: "さらに発展した空力頭部ユニット。光学センサー類の改良により効率的に目標の捜索・攻撃が可能となっている。"
 
 EQ_MOD_SLOT_MVLV_TSF_right_hand_slot_TITLE: "右手武器"
 EQ_MOD_SLOT_MVLV_TSF_right_hand_slot_TITLE_desc: "右手武器スロットの説明"
 EQ_MOD_CAT_MVLV_TSF_right_hand_type_TITLE: "右手武器"
 EQ_MOD_CAT_MVLV_TSF_right_hand_type_TITLE_desc: "右手武器タイプの説明"
 MVLV_TSF_basic_assault_cannon: "WS-16A 突撃砲"
 MVLV_TSF_basic_assault_cannon_desc: "初期の突撃銃。装弾数・火薬量ともに心もとなく、大型種を相手取るには不足する要素が多いが、生産性は高い。"
 MVLV_TSF_assault_cannon_1: "87式突撃砲"
 MVLV_TSF_assault_cannon_1_desc: "基本的な突撃銃。120mm砲と36mmチェーンガンを組み合わせたオーソドックスなデザインで、ある程度の性能がある。"
 MVLV_TSF_assault_cannon_2: "AMWS-21 戦闘システム"
 MVLV_TSF_assault_cannon_2_desc: "改良された突撃銃。信頼性向上や弾薬の改良によりBETAに対する有効性を高めている。"
 MVLV_TSF_assault_cannon_3: "XAMWS-24 試作新概念突撃砲"
 MVLV_TSF_assault_cannon_3_desc: "さらに発展した突撃銃。戦術機のFCSに情報を転送するためのレーザー測距装置を一体化し搭載するといった改良が施されている。"
 MVLV_TSF_railgun_1: "試製99型電磁投射砲 EML-99X"
 MVLV_TSF_railgun_1_desc: "G元素の実用化に伴って開発されたローレンツ力による火砲。砲身に係わる問題や電力のために開発は遅れていたが、G元素がそれを解決した。"
 MVLV_TSF_railgun_2: "試製99型電磁投射砲 EML-99X(バックコンテナ仕様)"
 MVLV_TSF_railgun_2_desc: "前線配備を見据えて量産性を向上し運用しやすいような調整が行われた超電磁砲。性能は若干低下している。"
 MVLV_TSF_railgun_3: "試製1200㎜超水平線砲"
 MVLV_TSF_railgun_3_desc: "さらなる性能向上を図り、圧倒的な破壊力を発揮する超電磁砲。§Y戦術機のセンサー類と組み合わされることで§!高い火力を発揮する。"
 MVLV_TSF_support_gun: "ラインメイタル Mk-57 中隊支援砲"
 MVLV_TSF_support_gun_desc: "戦術機単体による携行・運用を前提とした直接打撃・間接支援双方に対応可能な汎用砲。大型種や戦車級に対して高い有効性を発揮する。"
 
 EQ_MOD_SLOT_MVLV_TSF_left_hand_slot_TITLE: "左手武器"
 EQ_MOD_SLOT_MVLV_TSF_left_hand_slot_TITLE_desc: "左手武器スロットの説明"
 EQ_MOD_CAT_MVLV_TSF_add_wepon_type_TITLE: "追加突撃銃"
 EQ_MOD_CAT_MVLV_TSF_add_wepon_type_TITLE_desc: "追加突撃銃タイプの説明"
 MVLV_TSF_add_basic_assault_cannon: "WS-16A 追加突撃砲"
 MVLV_TSF_add_basic_assault_cannon_desc: "初期の突撃銃。装弾数・火薬量ともに心もとなく、大型種を相手取るには不足する要素が多いが、生産性は高い。"
 MVLV_TSF_add_assault_cannon_1: "87式突撃砲(追加マウント)"
 MVLV_TSF_add_assault_cannon_1_desc: "基本的な突撃銃。120mm砲と36mmチェーンガンを組み合わせたオーソドックスなデザインで、ある程度の性能がある。"
 MVLV_TSF_add_assault_cannon_2: "AMWS-21 追加マウント"
 MVLV_TSF_add_assault_cannon_2_desc: "改良された突撃銃。信頼性向上や弾薬の改良によりBETAに対する有効性を高めている。"
 MVLV_TSF_add_assault_cannon_3: "XAMWS-24 追加マウント"
 MVLV_TSF_add_assault_cannon_3_desc: "さらに発展した突撃銃。戦術機のFCSに情報を転送するためのレーザー測距装置を一体化し搭載するといった改良が施されている。"
 
 EQ_MOD_CAT_MVLV_TSF_shield_type_TITLE: "シールド"
 EQ_MOD_CAT_MVLV_TSF_shield_type_TITLE_desc: "シールドタイプの説明"
 MVLV_TSF_shield: "92式多目的追加装甲"
 MVLV_TSF_shield_desc: "対光線塗膜で塗装されたシールド。機動性の低下を代償に生存性を向上させることができる。"
 MVLV_TSF_reactive_shield: "DS-3多目的追加装甲 シェルツェン"
 MVLV_TSF_reactive_shield_desc: "爆発反応装甲を装備したシールド。まとわりつく小型種に対して高い破壊力を発揮できる。"
 
 EQ_MOD_CAT_MVLV_TSF_sword_type_TITLE: "近接長刀"
 EQ_MOD_CAT_MVLV_TSF_sword_type_TITLE_desc: "近接長刀タイプの説明"
 MVLV_TSF_long_sword: "74式近接戦闘長刀"
 MVLV_TSF_long_sword_desc: "機体全体を一つの刀として見立てる長刀。空力特性の改善だけでなく、取り回しの良さを誇る。"
 MVLV_TSF_heavy_sword: "77式近接戦用長刀(中華柳葉刀型)"
 MVLV_TSF_heavy_sword_desc: "純粋な重量から来る運動エネルギーによる打撃力を重視した長刀。破壊力に優れるが、取り回しは悪い。"
 
 EQ_MOD_SLOT_MVLV_TSF_head_slot_TITLE: "頭部"
 EQ_MOD_SLOT_MVLV_TSF_head_slot_TITLE_desc: "頭部追加スロットの説明"
 EQ_MOD_CAT_MVLV_TSF_add_sensor_type_TITLE: "追加センサー"
 EQ_MOD_CAT_MVLV_TSF_add_sensor_type_TITLE_desc: "追加センサータイプの説明"
 MVLV_TSF_basic_sensor_system: "第1世代統合センサーシステム"
 MVLV_TSF_basic_sensor_system_desc: "初期型センサーを追加する。探知能力はさほど高くないが、補助ツールとして役立つ。"
 MVLV_TSF_add_sensor_1: "多重センサーパッケージ(初期型)"
 MVLV_TSF_add_sensor_1_desc: "基本型センサーを追加する。対地レーダーの運用によりBETA群の存在を把握できる。"
 MVLV_TSF_add_sensor_2: "多重センサーパッケージ(改良型)"
 MVLV_TSF_add_sensor_2_desc: "改良型センサーを追加する。レーザー測距システムとの統合によりBETA群との距離を把握できる。"
 MVLV_TSF_add_sensor_3: "多重センサーパッケージ(発展型)"
