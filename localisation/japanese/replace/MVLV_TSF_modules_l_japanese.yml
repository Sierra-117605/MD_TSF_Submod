 MVLV_TSF_deta_link_1: "戦域データリンクシステム(初期型)"
 MVLV_TSF_deta_link_1_desc: "基本的なデータリンクシステム。近接データリンクにより周辺部隊の情報共有を受け、意思決定プロセスを補助する。"
 MVLV_TSF_deta_link_2: "戦域データリンクシステム(改良型)"
 MVLV_TSF_deta_link_2_desc: "改良されたデータリンクシステム。戦域データネットワークとの統合によりさらに状況認識能力を強化する。"
 MVLV_TSF_deta_link_3: "戦域データリンクシステム(発展型)"
 MVLV_TSF_deta_link_3_desc: "さらに発展したデータリンクシステム。上位指揮系統からの命令と、周辺との情報を統合することで相互連携さえも可能とする。"
 
 EQ_MOD_CAT_MVLV_TSF_sp_structure_type_TITLE: "機体構造材"
 EQ_MOD_CAT_MVLV_TSF_sp_structure_type_TITLE_Desc: "機体構造材タイプの説明"
 MVLV_TSF_reinforced_structure_1: "機体構造強化材 Type I"
 MVLV_TSF_reinforced_structure_1_desc: "機体全体の剛性を改善する構造材を導入する。耐衝撃性能といった様々な強度に関する要素を改善するが、生産コストや信頼性を犠牲にする。"
 MVLV_TSF_reinforced_structure_2: "機体構造強化材 Type II"
 MVLV_TSF_reinforced_structure_2_desc: "強化構造材の改良型。信頼性の問題を解決し、さらなる剛性の強化を可能とした代わりに生産コストがさらに増加する。"
 MVLV_TSF_reinforced_structure_3: "機体構造強化材 Type III"
 MVLV_TSF_reinforced_structure_3_desc: "強化構造材の発展型。生産コストはさらに膨れ上がったが、生存性も剛性もさらに高まっている。"
 
 MVLV_TSF_special_structure_1: "特殊機体構造強化材 タイプI"
 MVLV_TSF_special_structure_1_desc: "生産コストを低減する複合構造材を導入する。構造全体を簡略化することができるが、フレーム強度や信頼性を犠牲にする。"
 MVLV_TSF_special_structure_2: "特殊機体構造強化材 タイプII"
 MVLV_TSF_special_structure_2_desc: "複合構造材の改良型。フレーム強度の問題はそのままだが、信頼性をある程度改善しコストをさらに抑え込むことができる。"
 MVLV_TSF_special_structure_3: "特殊機体構造強化材 タイプIII"
 MVLV_TSF_special_structure_3_desc: "複合構造材の発展型。構造全体を一体化し生産プロセスを簡略化することで、さらなるコスト低減が可能。"
 MVLV_TSF_special_structure_4: "特殊機体構造強化材 タイプIV"
 MVLV_TSF_special_structure_4_desc: "従来の複合構造材のコンセプトを革新する。構造素材にG元素を導入し、機体フレームの製造コストを大幅に低下させる。"
 
 EQ_MOD_CAT_MVLV_TSF_sp_shell_type_TITLE: "専用弾薬"
 EQ_MOD_CAT_MVLV_TSF_sp_shell_type_TITLE_desc: "専用弾薬タイプの説明"
 MVLV_TSF_explosive_shell: "粘着榴弾 HESH/HEP"
 MVLV_TSF_explosive_shell_desc: "使用する弾薬の炸薬量を増やすことで、貫通力を犠牲にする代わりに軟目標への攻撃力を高める。安定運用のために信頼性とコストが犠牲になる。"
 MVLV_TSF_piercing_shell: "装弾筒付翼安定徹甲弾 APFSDS"
 MVLV_TSF_piercing_shell_desc: "使用する弾薬を強装の徹甲弾とすることで、軟目標に対する有効性を犠牲にする代わりに大型種への攻撃力を高める。銃身摩耗のために信頼性とコストが犠牲になる。"
 
 EQ_MOD_CAT_MVLV_TSF_sp_sight_type_TITLE: "専用照準装置"
 EQ_MOD_CAT_MVLV_TSF_sp_sight_type_TITLE_desc: "専用照準装置タイプの説明"
 MVLV_TSF_sniper_sight: "狙撃用 高精度 FCS"
 MVLV_TSF_sniper_sight_desc: "高倍率照準器を導入することで、目標の弱点部位を狙いやすくする。状況認識能力が一部犠牲となる。"
 MVLV_TSF_combat_sight: "戦闘用 FCS 照準補正装置"
 MVLV_TSF_combat_sight_desc: "近接照準器を導入することで、状況認識能力を高める。目標への照準能力が一部犠牲となる。"
 
 EQ_MOD_CAT_MVLV_TSF_sp_vibration_sensor_type_TITLE: "振動センサ―"
 EQ_MOD_CAT_MVLV_TSF_sp_vibration_sensor_type_TITLE_desc: "振動センサ―タイプの説明"
 MVLV_TSF_vibration_sensor_1: "対BETA振動検知システム 試製型"
 MVLV_TSF_vibration_sensor_1_desc: "初期型の振動センサー。地表を進むBETA群を探知することができる。"
 MVLV_TSF_vibration_sensor_2: "対BETA振動検知システム 改良型"
 MVLV_TSF_vibration_sensor_2_desc: "基本型の振動センサー。震音から大規模に進むBETA群を探知することができる。"
 MVLV_TSF_vibration_sensor_3: "対BETA振動検知システム 発展型"
 MVLV_TSF_vibration_sensor_3_desc: "改良型の振動センサー。震音から存在するBETA群と、その規模を把握することができる。"
 MVLV_TSF_vibration_sensor_4: "対BETA振動検知システム 完成型"
 MVLV_TSF_vibration_sensor_4_desc: "発展型の振動センサー。震音からBETA群の規模、およびその予想される現在位置を把握できる。"
 
 EQ_MOD_CAT_MVLV_TSF_sp_maintenance_team_type_TITLE: "整備・鹵獲モジュール"
 EQ_MOD_CAT_MVLV_TSF_sp_maintenance_team_type_TITLE_desc: "整備・鹵獲モジュールタイプの説明"
 MVLV_TSF_maintenance_team_1: "専従整備班"
 MVLV_TSF_maintenance_team_1_desc: "戦術機に対して専属の整備班を用意する。コストは増加するが、整備により信頼性を高めることができる。"
 MVLV_TSF_maintenance_team_2: "熟練整備班"
 MVLV_TSF_maintenance_team_2_desc: "戦術機に対して専門の訓練を受けた整備班を用意する。コストはさらに増加するが、さらなる信頼性を獲得できる。"
 MVLV_TSF_maintenance_team_3: "特務整備班"
 MVLV_TSF_maintenance_team_3_desc: "戦術機に対して前線での活動を想定した整備班を用意する。信頼性は向上するが、機体全体の剛性維持は困難になる。"
 MVLV_TSF_capture_team: "BETA 鹵獲解析班"
 MVLV_TSF_capture_team_desc: "BETAを鹵獲するための各種装備。機体性能が全体的に犠牲になるが、戦術機によりBETAの標本サンプルを確保できるようになる。"
 
 EQ_MOD_CAT_MVLV_TSF_sp_custom_module_type_TITLE: "特化モジュール"
 EQ_MOD_CAT_MVLV_TSF_sp_custom_module_type_TITLE_desc: "基本設計をそのままに特定の用途・仕様に特化させるモジュール群"
 MVLV_TSF_cruise_custom: "長距離巡航カスタム"
 MVLV_TSF_cruise_custom_desc: "巡航速度を高めるカスタム。その代償として、短期的な機動性や信頼性などが低下している。"
 MVLV_TSF_super_cruise_custom: "超長距離巡航カスタム"
 MVLV_TSF_super_cruise_custom_desc: "巡航速度を極限まで高めるカスタム。これを使いこなせる衛士はごくわずかである。"
 MVLV_TSF_limit_custom: "限定運用カスタム"
 MVLV_TSF_limit_custom_desc: "機体の出力をOSレベルで制限するカスタム。動きは多少鈍くなるが、信頼性の向上や耐久消耗の抑制が見込める。"
 MVLV_TSF_hight_limit_custom: "高高度運用カスタム"
 MVLV_TSF_hight_limit_custom_desc: "機体出力を大きく制限するカスタム。動作速度の低下を代償に、耐久の消耗や整備時間を大きく抑えることができる。"
 MVLV_TSF_combat_custom: "戦闘特化カスタム"
 MVLV_TSF_combat_custom_desc: "機体の瞬発力を上昇させ、接近戦時の生存力を向上させるカスタム。リソースの多くを機体制御に割くため、FCSや巡航能力は低下することになる。"

 MVLV_TSF_support_assault_cannon_1: "87式支援突撃砲"
 MVLV_TSF_support_assault_cannon_1_desc: "基本的な支援突撃銃。36mmチェーンガンと独自の照準補助装置を搭載しており、正確な射撃を得意としている。"
 MVLV_TSF_support_assault_cannon_2: "AMWS-21 戦闘システム支援突撃砲"
 MVLV_TSF_support_assault_cannon_2_desc: "改良された支援突撃銃。信頼性向上や反動制御装置の改良で、より正確にBETAの弱点を狙撃できるようになっている。"
 MVLV_TSF_support_assault_cannon_3: "XAMWS-24 試作支援突撃砲"
 MVLV_TSF_support_assault_cannon_3_desc: "さらに発展した支援突撃銃。戦術機のFCSに情報を転送するためのレーザー測距装置を一体化し搭載するといった改良が施されている。"


 