 MVLV_TSF_fcs_1: "FCS(火器管制装置) Mark I"
 MVLV_TSF_fcs_1_desc: "基本的な火器管制システム。センサー類やOSと連携し目標選択および効率的な攻撃を可能とする。"
 MVLV_TSF_fcs_2: "FCS(火器管制装置) Mark II"
 MVLV_TSF_fcs_2_desc: "改良された火器管制システム。機械的な同時多目標追跡を可能としており、目標選定の効率を改善する。"
 MVLV_TSF_fcs_3: "FCS(火器管制装置) Mark III"
 MVLV_TSF_fcs_3_desc: "さらに発展した火器管制システム。照準安定システムに加えデジタルズーム機能を備えることでさらなる火力の効率的な発揮を図っている。"
 
 EQ_MOD_CAT_MVLV_TSF_sp_dataLink_type_TITLE: "データリンクシステム"
