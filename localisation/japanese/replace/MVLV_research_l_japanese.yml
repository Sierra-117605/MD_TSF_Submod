 MVLV_xg_1st: "XG-70d"
 beta_combat_tactics: "BETAの戦術"
 beta_combat_tactics_desc: "人間への興味を持ち、研究し尽くした結果が戦術として現れている。"
 human_combat_tactics: "対BETA戦術"
 human_combat_tactics_desc: "BETAの研究やこれまでの経験を基にした対BETA専用戦術。"
 MOBILE_WARFARE_DOCTRINE_LABEL: "機動打撃ドクトリン"
 MOBILE_WARFARE_DOCTRINE_DESC: "NATO諸国は、戦術機と他兵種の連携による包囲殲滅を主眼に置いた戦術を採用し、兵士の生存率向上を目指している。 "
 SUPERIOR_FIREPOWER_DOCTRINE_LABEL: "近接攻撃ドクトリン"
 SUPERIOR_FIREPOWER_DOCTRINE_DESC: "WTO諸国や日本等のハイヴを抱える国家は、戦術機の集団的運用による近接戦闘での敵の撃破を目標としている。 "
 GRAND_BATTLEPLAN_DOCTRINE_LABEL: "総力戦ドクトリン"
 GRAND_BATTLEPLAN_DOCTRINE_DESC: "総動員体制のもと国民全てを動員して防衛体制を構築する。目的はどんな手段を使っても国家を守り抜く事である。"
 MOBILE_INFANTRY_LABEL: "高次元打撃戦"
 MOBILE_INFANTRY_LABEL_TT: "G弾の運用を想定した高次元な連携と手厚い支援を組み込み、前線の負担を最小限にする。 "
 BLITZKRIEG_LABEL: "ALLTSF"
 BLITZKRIEG_LABEL_TT: "戦術機の連携精度を向上させ、中距離支援を含むすべての作戦行動を戦術機のみで実行できるシステムを構築する。 "
 DISPERSED_SUPPORT_LABEL: "機動突撃"
 DISPERSED_SUPPORT_LABEL_TT: "軍全体の速度を向上させることでBETA梯団奥深くに浸透し攪乱する。 "
 INTEGRATED_SUPPORT_LABEL: "密集近接戦"
 INTEGRATED_SUPPORT_LABEL_TT: "密集した状態でも相互連携を行えるようにすることで、ハイヴなどの極限状況でも生き残ることが可能になる。"
 ASSAULT_LABEL: "死守"
 ASSAULT_LABEL_TT: "我々に退路は無く、後ろには市民がいる。あらゆる犠牲を払ってでも守り抜く必要がある。"
 INFILTRATION_LABEL: "機動防衛"
 INFILTRATION_LABEL_TT: "各兵科の連携と連絡を密にし、柔軟な機動戦術をもって攻守共にいかなる状況にも対応できるようにする。 "
 
 cat_mobile_warfare: "機動打撃ドクトリン"
 cat_superior_firepower: "近接攻撃ドクトリン"
 cat_grand_battle_plan: "総力戦ドクトリン"
 
 mobile_warfare: "機動戦"
 mobile_warfare_desc: "機動戦は速度と機動により敵軍の体制を乱すことに焦点を当てる。 \n\n"
 elastic_defence: "アクティブディフェンス"
 elastic_defence_desc: "前進を防ぐよりも、 「深い」防衛線を形成することにより攻撃側の前進を遅らせ、 防御部隊が防御し、 更に反撃する時間を稼ぐ。 "
 mobile_infantry: "機動支援"
 mobile_infantry_desc: "支援火力の効率的な機動運用は、前線部隊の損耗を最小限にとどめるだけでなく、\n前線兵士の士気を高めるのに非常に効果的だ。\n我々には必要な火力を必要な場所に届けることができるとBETAに見せつけるのだ！\n\n"
 mass_motorization: "大規模な無人化"
 mass_motorization_desc: "無人兵器はかゆいところに手は届かないが、要は使いようだ。\n計画的な運用によって足りない火力を補い、また時には時間稼ぎに使うこともできる。\n兵士の士気や人命を考えれば安いものだ。"
 mechanised_offensive: "大規模支援と露払い"
 mechanised_offensive_desc: "大規模な支援砲撃によって敵の主力を撃破した後、戦術機などの諸兵科で残敵掃討を行う。\n犠牲が弾薬で買えるならこれほど効果的な買い物はない。"
 mechanised_offensive1: "UAVの大量投入"
 mechanised_offensive1_desc: "UAVは光線級に撃墜されうるが偵察に有人兵器を使うよりはマシだ。\n少なくとも光線級の有無や配置がわかるので取れる戦術の幅が広がる。\n地上ドローンも活用し大規模な偵察を行う。\n"
 mechanised_offensive2: "圧倒的支援とG弾を"
 mechanised_offensive2_desc: "もはや我々の前に障害はない。\nなぜならばBETAのもたらした究極の兵器と圧倒的な支援があるからだ。\nもはや見せつける必要もない。\nこれが我々の常識だ。\n"
 
 schwerpunk: "重心"
 schwerpunk_desc: "いかなる作戦においても勝利するためには、 その「Schwerpunkt（重心）」もしくは焦点を認識し、 最大の戦力をそこに集中しなければならない。 "
 blitzkrieg: "浸透突破"
 blitzkrieg_desc: "敵群に突入した戦術機部隊の連携精度を高め、部隊全体の速度を向上する。 "
 blitzkrieg1: "戦術機の機動戦術"
 blitzkrieg1_desc: "戦術機の機動力を生かし攪乱と包囲を行い確実な殲滅を行う。"
 blitzkrieg2: "ALL-TSFの真髄"
 blitzkrieg2_desc: "ALL-TSF戦術であれば他部隊の機動力といった足かせは存在しない。\nこれにより戦術機の運用の柔軟性が上昇し、より多くの部隊を集中的に運用できるようになる。"
 
 
 sup_delay: "遅滞"
 sup_delay_desc: "勝利できないときも、 待ち伏せと時間稼ぎは攻撃側の進行を遅らせるために有効である。 "
 mobile_defence: "機動戦闘"
 mobile_defence_desc: "戦術機部隊は敵がどこから攻撃してきても、 防御を支援することができる。 "
 intergrated_support: "統合支援"
 intergrated_support_desc: "支援部隊と実戦部隊を統合することで、 師団の攻撃を強力にする。 \n\n"
 regimental_combat_teams: "機動戦闘"
 regimental_combat_teams_desc: "常に動き続けることによってBETAに攻撃される機会を減らし、\n部隊の損害を最大限に減らすのだ。\n失うのは燃料だけで済む。\n"
 regimental_combat_teams1: "戦術機による陽動"
 regimental_combat_teams1_desc: "BETAは高性能な有人機に引き付けられる。\nその特性を生かし、敵陣中央で戦術機部隊が陽動攻撃を行い敵を集め、\n砲撃部隊による飽和攻撃をより効果的なものとする。 "
 regimental_combat_teams2: "密集近接戦闘"
 regimental_combat_teams2_desc: "密集した部隊は動きが制限されると思われるが、\nそれは高い練度と相互連携によって死角を廃する戦術と化す。\n"
 regimental_combat_teams3: "人を超えし衛士達"
 regimental_combat_teams3_desc: "後催眠暗示、薬物により精神が強化された衛士は、驚異的な戦闘能力を発揮する。 "

 dispersed_support: "分散支援"
 dispersed_support_desc: "支援部隊を分散させることでより広大な戦線に火力を行き渡らせ、 結果として師団の防衛能力を高める。 \n\n"
 overwhelming_firepower: "機動包囲"
 overwhelming_firepower_desc: "戦術機部隊が敵正面で陽動突撃および光線級吶喊を敢行する間に、戦車部隊による回り込みを行い、\nこれを殲滅する。\n"
 overwhelming_firepower1: "戦術突貫"
 overwhelming_firepower1_desc: "あらゆる難地形も戦術機の機動力を持ってすればなんということはない。\n"
 overwhelming_firepower2: "総合機動突撃"
 overwhelming_firepower2_desc: "圧倒的速度と速度差を活かした高度な戦術によりBETAの殲滅を繰り返す。\nもはや我々に追いつける者はいない。\n速さは正義...それを体現するのだ！ "
 overwhelming_firepower3: "陽動突撃"
 overwhelming_firepower3_desc: "陽動によってBETAを釣り出し素早く殲滅する。\n卓越した戦術と機動力に突破できない地形はない。"

 tactical_control: "戦術統制"
 tactical_control_desc: "前線における諸兵科連合に慣れ親しんだ士官達は、 今や全兵科の作戦を直接に統制することができる。 "
 grand_battle_plan: "要所の防衛"
 grand_battle_plan_desc: "対BETAにおいて柔軟な防御が必要だが最終防衛においてどうしても保持しなければならない場合がある。そのための備えを怠るべきではない。 \n\n"
 trench_warfare: "対BETA塹壕戦"
 trench_warfare_desc: "塹壕は防御の基本である。対BETA戦においてそれは即席の要塞であり、早急に構築できるかどうかが鍵である。 "
 grand_assault: "総力の統制"
 grand_assault_desc: "十分に統率された軍は早期に態勢を整え、長期の作戦に耐えうるだろう。 "
 absolute_defense_line: "絶対防衛線"
 absolute_defense_line_desc: "領土的縦深のない国にとって後退は国力の衰退と滅亡を意味する。であるからに、防衛線はかつてない要塞化を可能な限り早く達成せねばならず、死力を尽くして守らねばならない。 \n\n"
 assault_concentration: "総力防衛"
 assault_concentration_desc: "どのような兵器を運用するにおいても基本となるのは歩兵だ。よって、歩兵に対するケアは最大限に行わなければならない。 "
 branch_interoperation: "兵科の相互運用"
 branch_interoperation_desc: "軍隊の異なる分野間の相互作用を強化することは諸兵科連合作戦において軍隊をより良く作用できるようにする。 "
 assault_breakthrough: "人海戦術"
 assault_breakthrough_desc: "我々は生き残るために最後の一瞬まで抵抗せねばならない。もし我々が単独で祖国を防衛することが不可能であっても、 絶え間なく、 敵が攻撃を開始することを妨げ、 なおかつ損失を引き起こしうる小規模な攻撃を続けなければならない。 "
 infantry_offensive: "縦深戦術"
 infantry_offensive_desc: "BETAは強大だが速度は遅い。素早い撤退で早急に防衛体制を整えることで有利に戦うことができる。その為のシステムを新規に構築する。 \n\n"
 armored_operations: "戦術機運用論"
 armored_operations_desc: "戦術機は高価であるが、非常に強力な兵器である。これらをもっと効率よく運用するべくシステムを改善する。 "
 infiltration_assault: "効率的な補給"
 infiltration_assault_desc: "補給コンテナ投下作戦は大規模な作戦でしか行われない。宇宙軍を持たない国家であっても物資の補給を効率よく行うべく別の手段を構築する必要がある。"
 night_assault_tactics: "戦車強襲戦術"
 night_assault_tactics_desc: "高価な戦術機を失わずに攻勢を行うべく戦車や機械化歩兵であっても攻勢に転用できるように訓練をおこなう。 "
 attritional_containment: "戦場の女神"
 attritional_containment_desc: "対BETAにおいて砲兵の果たす役割は攻防以外にも対レーザー弾頭による援護など多岐にわたる。特に内陸においてはこの役割が大きい。我々はこれを効率的に活用せねばならない。 "
 antitank1: "電磁投射砲改良"
 antitank1_desc: "電磁投射砲"
 antitank2: "電磁投射砲 II"
 antitank2_desc: "電磁投射砲"
 antitank3: "改良型電磁投射砲改善 I"
 antitank3_desc: "電磁投射砲"
 antitank4: "改良型電磁投射砲改善 II"
 antitank4_desc: "電磁投射砲"
 antitank5: "電磁投射砲 V"
 antitank5_desc: "電磁投射砲"
 artillery1: "自走榴弾砲 I"
 artillery1_desc: "より近代的な素材と機構によって先の大戦からの榴弾砲と野砲は薬室の改造と近代戦争への近代化がなされた。 "
 artillery2: "改良型自走榴弾砲改良 I"
 artillery2_desc: "改良された野砲を我々は運用できるようになった。 新しい榴弾砲の設計には、 新型の油圧式リコイル装置とより長い砲身が必要となる。 "
 artillery3: "改良型自走榴弾砲改良 II"
 artillery3_desc: "改良型自走榴弾砲改良 II"
 artillery4: "自走榴弾砲 IV"
 artillery4_desc: "自走榴弾砲 IV"
 artillery5: "発展型自走榴弾砲改良"
 artillery5_desc: "全高を低くした設計の砲は、 敵が標的にするのをより困難にさせる。 "
 mountain_gun: "山砲"
 mountain_gun_desc: "北部インドの峻険な地形が、 分解しラバの背に乗せて必要ならどこにでも運搬できる砲の開発を促した。 "
 rocket_artillery2: "自走ロケット砲改良 I"
 rocket_artillery2_desc: "自走自走砲が多連装ロケット砲を利用し迅速な大規模破壊と同時に反撃を避ける保守機動が可能になる。 "
 rocket_artillery3: "自走ロケット砲改良 II"
 rocket_artillery3_desc: "部隊ごとに運用することで、 砲兵隊は組織的に再装填と迅速な陣地転換を行うことができる。 "
 rocket_artillery4: "自走ロケット砲 III"
 rocket_artillery4_desc: "旋回安定ロケットは軽砲兵隊の射程を上昇させることができる。 "
 tech_special_forces: "軌道降下部隊"
 tech_special_forces_desc: "ハイヴでの戦闘には専門の訓練が必要である。 我々は、 軍隊が厳しい状況に適応できるように準備する必要がある。 "
 advanced_special_forces: "高度突入訓練"
 advanced_special_forces_desc: "大規模な訓練により、 我が国の突入部隊が一般衛士以上の能力を発揮できるようになる。 "
 improved_special_forces: "降下部隊拡大計画"
 improved_special_forces_desc: "ハイヴ突入部隊は一般兵が実行できない任務を実行することができる。 腕利きの兵士をより多く手に入れるために、 訓練の方法をより良くする必要がある。 "
 extreme_environment_training: "ハイヴ内環境訓練"
 extreme_environment_training_desc: "突入部隊の衛士たちは非常に厳しい環境で戦う必要がある。 適切な訓練と装備によって、 我々の軍隊は非常に厳しいハイヴ内の環境で戦うことができるようになる。 "
 survival_training: "生存訓練"
 survival_training_desc: "降下部隊はしばしば敵の後背で戦い、 そのため物資不足に陥る。 厳しい天候に耐え、 限られた物資で戦えるように彼らを訓練する必要がある。 "
 elite_forces: "精鋭部隊"
 elite_forces_desc: "超一流のものだけが精鋭部隊になれる。 この訓練を通じて作る衛士は誰よりも強く、 速く、 より強く戦うだろう。 "
 MVLV_sov_tec: "П3計画"
 MVLV_sov_tec_desc: ""
 atomic_research: "G元素研究"
 atomic_research_desc: "G元素の臨界反応は、人類に新たな希望をもたらす可能性のある、この方向への驚くべき重力偏差を生み出す。"
 nukes: "G弾"
 nukes_desc: "理論的には、G弾はとてつもない破壊力を持つと同時に制御可能であり、ひとたび実戦に投入されれば、人類に不利な状況を一変させる可能性がある。"
 infantry_at: "歩兵対戦車兵器 I"
 infantry_at_desc: "歩兵ユニットに対戦車ライフルを装備させれば、戦車クラスに対抗しつつ、勢いを失わないようにできる。"
 infantry_at2: "歩兵対戦車兵器 II"
 infantry_at2_desc: "歩兵が大型のBETAに対して有効であるためには、より小型で軽量な突撃兵器を作らなければならない。"

