 MVLV_research_head_normal_1: "基本型頭部"
 MVLV_research_head_normal_1_desc: "基本的な頭部ユニット。人間と同等の視野角を提供し、環境センサーを搭載している。"
 MVLV_research_head_normal_2: "改良型頭部"
 MVLV_research_head_normal_2_desc: "改良された頭部ユニット。光学ズームシステムを搭載したことで遠距離の目標を観測できる。"
 MVLV_research_head_normal_3: "発展型頭部"
 MVLV_research_head_normal_3_desc: "さらに発展した頭部ユニット。サーマルサイトといった赤外線センサーの導入により効率的な目標の発見が可能。"
 MVLV_research_head_heavy_1: "基本型装甲頭部"
 MVLV_research_head_heavy_1_desc: "状況認識能力を犠牲に装甲を強化している頭部ユニット。BETAの攻撃からの生存性を高めることができるが、視野角といった要素は犠牲になる。"
 MVLV_research_head_heavy_2: "改良型装甲頭部"
 MVLV_research_head_heavy_2_desc: "改良された装甲頭部ユニット。基本的な頭部ユニットに準じた性能を獲得し、視察能力も改善されている。"
 MVLV_research_head_heavy_3: "発展型装甲頭部"
 MVLV_research_head_heavy_3_desc: "さらに発展した装甲頭部ユニット。光学ズームや環境センサーの運用が可能となり、状況認識能力がさらに改善されている。"
 MVLV_research_head_aerial_1: "基本型空力頭部"
 MVLV_research_head_aerial_1_desc: "装甲を犠牲に空力特性を追求した頭部ユニット。センサー類および視野角に大きな強みを持つが、生存性といった要素は犠牲になる。"
 MVLV_research_head_aerial_2: "改良型空力頭部"
 MVLV_research_head_aerial_2_desc: "改良された空力頭部ユニット。環境センサー類との統合やシステムとの連接最適化によって状況認識能力を高めている。"
 MVLV_research_head_aerial_3: "発展型空力頭部"
 MVLV_research_head_aerial_3_desc: "さらに発展した空力頭部ユニット。光学センサー類の改良により効率的に目標の捜索・攻撃が可能となっている。"

 MVLV_research_armor_heavy: "重装甲"
 MVLV_research_armor_heavy_desc: "機体全体の剛性および装甲を強化する。信頼性の低下は免れないが、一度や二度の攻撃で撃破されることを回避できる。"
 MVLV_research_armor_light: "軽装甲"
 MVLV_research_armor_light_desc: "装甲を減じ、機動性を向上させる。事故の原因にもなり大型種相手にも撃破されやすくなるが、コストも低減できる。"
 MVLV_research_armor_composite: "複合装甲"
 MVLV_research_armor_composite_desc: "対光線塗膜や複数素材を用いて構成される複合装甲。コストは増加するが、機動性をそのままに高い生存性を提供する。"

 MVLV_research_reinforced_structure_1: "基本強化構造材"
 MVLV_research_reinforced_structure_1_desc: "機体全体の剛性を改善する構造材を導入する。耐衝撃性能といった様々な強度に関する要素を改善するが、生産コストや信頼性を犠牲にする。"
 MVLV_research_reinforced_structure_2: "改良強化構造材"
 MVLV_research_reinforced_structure_2_desc: "強化構造材の改良型。信頼性の問題を解決し、さらなる剛性の強化を可能とした代わりに生産コストがさらに増加する。"
 MVLV_research_reinforced_structure_3: "発展強化構造材"
 MVLV_research_reinforced_structure_3_desc: "強化構造材の発展型。生産コストはさらに膨れ上がったが、生存性も剛性もさらに高まっている。"
 MVLV_research_special_structure_1: "基本複合構造材"
 MVLV_research_special_structure_1_desc: "生産コストを低減する複合構造材を導入する。構造全体を簡略化することができるが、フレーム強度や信頼性を犠牲にする。"
 MVLV_research_special_structure_2: "改良複合構造材"
 MVLV_research_special_structure_2_desc: "複合構造材の改良型。フレーム強度の問題はそのままだが、信頼性をある程度改善しコストをさらに抑え込むことができる。"
 MVLV_research_special_structure_3: "発展複合構造材"
 MVLV_research_special_structure_3_desc: "複合構造材の発展型。構造全体を一体化し生産プロセスを簡略化することで、さらなるコスト低減が可能。"
 MVLV_research_special_structure_4: "未来複合構造材"
 MVLV_research_special_structure_4_desc: "従来の複合構造材のコンセプトを革新する。構造素材にG元素を導入し、機体フレームの製造コストを大幅に低下させる。"
 
 MVLV_research_add_blade_armor: "ブレードエッジ装甲"
 MVLV_research_add_blade_armor_desc: "ブレードエッジ装甲を追加する。近接戦闘で攻撃手段となり、攻撃力向上に繋がる。"
 MVLV_research_add_aerial_blade_armor: "エアリアルブレード装甲"
 MVLV_research_add_aerial_blade_armor_desc: "エアリアルブレード装甲を追加する。空力特性を重視したタイプで、機動性と攻撃力の双方を改善する。"
 MVLV_research_special_blade_armor: "特製ブレードエッジ装甲"
 MVLV_research_special_blade_armor_desc: "スーパーカーボン製ブレードエッジ装甲を追加する。生産コストは跳ね上がるが、各種性能を大きく向上させる。"
 
 MVLV_research_assault_cannon_1: "基本型突撃銃"
 MVLV_research_assault_cannon_1_desc: "基本的な突撃銃。120mm砲と36mmチェーンガンを組み合わせたオーソドックスなデザインで、ある程度の性能がある。"
 MVLV_research_assault_cannon_2: "改良型突撃銃"
 MVLV_research_assault_cannon_2_desc: "改良された突撃銃。信頼性向上や弾薬の改良によりBETAに対する有効性を高めている。"
 MVLV_research_assault_cannon_3: "発展型突撃銃"
 MVLV_research_assault_cannon_3_desc: "さらに発展した突撃銃。戦術機のFCSに情報を転送するためのレーザー測距装置を一体化し搭載するといった改良が施されている。"
 MVLV_research_railgun_1: "基本型電磁投射砲"
 MVLV_research_railgun_1_desc: "G元素の実用化に伴って開発されたローレンツ力による火砲。砲身に係わる問題や電力のために開発は遅れていたが、G元素がそれを解決した。"
 MVLV_research_railgun_2: "改良型電磁投射砲"
 MVLV_research_railgun_2_desc: "前線配備を見据えて量産性を向上し運用しやすいような調整が行われた超電磁砲。性能は若干低下している。"
 MVLV_research_railgun_3: "発展型電磁投射砲"
 MVLV_research_railgun_3_desc: "さらなる性能向上を図り、圧倒的な破壊力を発揮する超電磁砲。戦術機のセンサー類と組み合わされることで高い火力を発揮する。"
 MVLV_research_support_gun: "中隊支援砲"
 MVLV_research_support_gun_desc: "戦術機単体による携行・運用を前提とした直接打撃・間接支援双方に対応可能な汎用砲。大型種や戦車級に対して高い有効性を発揮する。"
 
 MVLV_research_combat_sword: "近接兵装"
 MVLV_research_combat_sword_desc: "近接兵装研究の説明"

 MVLV_research_shield: "シールド"
 MVLV_research_shield_desc: "対光線塗膜で塗装されたシールド。機動性の低下を代償に生存性を向上させることができる。"
 MVLV_research_reactive_shield: "リアクティブシールド"
 MVLV_research_reactive_shield_desc: "爆発反応装甲を装備したシールド。まとわりつく小型種に対して高い破壊力を発揮できる。"

 MVLV_research_large_missile_1: "基本型大型ミサイル"
 MVLV_research_large_missile_1_desc: "巡航ミサイル用フレームを追加する。BETAの集団に対して高い効果を発揮するが、機動性や各種機器に大きな負荷をかけることになる。"
 MVLV_research_large_missile_2: "強化型大型ミサイル"
 MVLV_research_large_missile_2_desc: "さらに強化された巡航ミサイル発射用のフレーム。ミサイル自体の性能向上が図られており、小型種にも高い効果を発揮する。"
 MVLV_research_small_missile: "汎用小型ミサイル"
 MVLV_research_small_missile_desc: "様々な戦術機に簡単な改造で装備できるミサイル発射用フレーム。面制圧に際して高い火力を発揮するが、機動性は低下する。"
 
 MVLV_research_add_sensor_1: "基本型追加センサー"
 MVLV_research_add_sensor_1_desc: "基本型センサーを追加する。対地レーダーの運用によりBETA群の存在を把握できる。"
 MVLV_research_add_sensor_2: "改良型追加センサー"
 MVLV_research_add_sensor_2_desc: "改良型センサーを追加する。レーザー測距システムとの統合によりBETA群との距離を把握できる。"
 MVLV_research_add_sensor_3: "発展型追加センサー"
 MVLV_research_add_sensor_3_desc: "発展型センサーを追加する。光学センサー類を導入することでBETA群の構成要素を把握できる。"

 MVLV_research_deta_link_1: "基本型データリンク"
 MVLV_research_deta_link_1_desc: "基本的なデータリンクシステム。近接データリンクにより周辺部隊の情報共有を受け、意思決定プロセスを補助する。"
 MVLV_research_deta_link_2: "改良型データリンク"
 MVLV_research_deta_link_2_desc: "改良されたデータリンクシステム。戦域データネットワークとの統合によりさらに状況認識能力を強化する。"
 MVLV_research_deta_link_3: "発展型データリンク"
 MVLV_research_deta_link_3_desc: "さらに発展したデータリンクシステム。上位指揮系統からの命令と、周辺との情報を統合することで相互連携さえも可能とする。"
 
 MVLV_research_supplies: "追加物資"
 MVLV_research_supplies_desc: "兵装搭載セクションの一部を補給物資用に換装する。ミサイル・弾薬・推進剤といったあらゆるものを格納することができ、長期戦において役立つ。"

 MVLV_research_custom_sights: "専用照準装置"
 MVLV_research_custom_sights_desc: "専用照準装置の説明"
 MVLV_research_custom_shells: "専用弾薬"
 MVLV_research_custom_shells_desc: "専用弾薬の説明"

 MVLV_research_maintenance_team_1: "基本整備班"
 MVLV_research_maintenance_team_1_desc: "戦術機に対して専属の整備班を用意する。コストは増加するが、整備により信頼性を高めることができる。"
 MVLV_research_maintenance_team_2: "熟練整備班"
 MVLV_research_maintenance_team_2_desc: "戦術機に対して専門の訓練を受けた整備班を用意する。コストはさらに増加するが、さらなる信頼性を獲得できる。"
 MVLV_research_maintenance_team_3: "前線整備班"
 MVLV_research_maintenance_team_3_desc: "戦術機に対して前線での活動を想定した整備班を用意する。信頼性は向上するが、機体全体の剛性維持は困難になる。"
 MVLV_research_capture_team: "BETA鹵獲兵装"
 MVLV_research_capture_team_desc: "BETAを鹵獲するための各種装備。機体性能が全体的に犠牲になるが、戦術機によりBETAの標本サンプルを確保できるようになる。"
 

 MVLV_research_custom_module_1: "特化モジュール1"
 MVLV_research_custom_module_1_desc: "特化モジュール1の説明"
 MVLV_research_custom_module_2: "特化モジュール2"
 MVLV_research_custom_module_2_desc: "特化モジュール2の説明"
